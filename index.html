const categoryMap = {
  'org': '组织相关',
  'efficiency': 'AI提效/人力影响',
  'policy': 'AI风险与政策',
  'talent': 'AI人才',
  'other': '其它AI相关'
};

let activeCategory = '';
let activeCompany = '';
let dateStart = null;
let dateEnd = null;
let currentPage = 1;
let pageSize = 10;
let lastFiltered = [];

// Date filter logic
const today = new Date();
let calLeftMonth = new Date(today.getFullYear(), today.getMonth(), 1);
let calRightMonth = new Date(today.getFullYear(), today.getMonth() + 1, 1);

function toggleDatePanel() {
  const panel = document.getElementById('date-panel');
  const trigger = document.getElementById('date-trigger');
  panel.classList.toggle('open');
  trigger.classList.toggle('active');
  if (panel.classList.contains('open')) renderCalendars();
}

function confirmDatePanel() {
  document.getElementById('date-panel').classList.remove('open');
  document.getElementById('date-trigger').classList.remove('active');
}

function switchDateTab(tab) {
  document.querySelectorAll('.date-tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelector(`.date-tab-btn[data-tab="${tab}"]`).classList.add('active');
  document.getElementById('date-tab-dynamic').style.display = tab === 'dynamic' ? 'block' : 'none';
  document.getElementById('date-tab-fixed').style.display = tab === 'fixed' ? 'block' : 'none';
  if (tab === 'fixed') renderCalendars();
}

function setDynamicRange(range) {
  let start, end = new Date(today);
  document.querySelectorAll('.date-preset').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  if (typeof range === 'number') {
    start = new Date(today); start.setDate(today.getDate() - range + 1);
  } else if (range === 'thisWeek') {
    start = new Date(today); const day = start.getDay() || 7; start.setDate(start.getDate() - day + 1);
  } else if (range === 'lastWeek') {
    end = new Date(today); const day = end.getDay() || 7; end.setDate(end.getDate() - day);
    start = new Date(end); start.setDate(end.getDate() - 6);
  } else if (range === 'thisMonth') {
    start = new Date(today.getFullYear(), today.getMonth(), 1);
  } else if (range === 'lastMonth') {
    start = new Date(today.getFullYear(), today.getMonth() - 1, 1);
    end = new Date(today.getFullYear(), today.getMonth(), 0);
  }
  dateStart = start; dateEnd = end;
  syncDateInputs(); updateDateDisplay(); currentPage = 1; renderNews();
}

function onDateInputChange() {
  const s = document.getElementById('date-start').value;
  const e = document.getElementById('date-end').value;
  if (s) dateStart = new Date(s);
  if (e) dateEnd = new Date(e);
  if (dateStart && dateEnd && dateEnd < dateStart) {
    const tmp = dateStart; dateStart = dateEnd; dateEnd = tmp; syncDateInputs();
  }
  updateDateDisplay(); renderCalendars(); currentPage = 1; renderNews();
}

function onCalDayClick(year, month, day) {
  const clicked = new Date(year, month, day);
  if (!dateStart || (dateStart && dateEnd)) {
    dateStart = clicked; dateEnd = null;
  } else {
    if (clicked < dateStart) { dateEnd = dateStart; dateStart = clicked; }
    else { dateEnd = clicked; }
  }
  syncDateInputs(); updateDateDisplay(); renderCalendars(); renderNews();
}

function syncDateInputs() {
  const fmt = d => {
    if (!d) return '';
    const y = d.getFullYear();
    const m = String(d.getMonth() + 1).padStart(2, '0');
    const dd = String(d.getDate()).padStart(2, '0');
    return `${y}-${m}-${dd}`;
  };
  document.getElementById('date-start').value = fmt(dateStart);
  document.getElementById('date-end').value = fmt(dateEnd);
}

function clearDateFilter() {
  dateStart = null; dateEnd = null;
  document.getElementById('date-start').value = '';
  document.getElementById('date-end').value = '';
  document.querySelectorAll('.date-preset').forEach(b => b.classList.remove('active'));
  updateDateDisplay(); renderCalendars(); currentPage = 1; renderNews();
}

function updateDateDisplay() {
  const display = document.getElementById('date-display');
  if (!dateStart && !dateEnd) { display.textContent = '全部时间'; }
  else {
    const fmt = d => d ? `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}` : '...';
    display.textContent = `${fmt(dateStart)} ~ ${fmt(dateEnd)}`;
  }
}

function renderCalendars() {
  renderOneMonth('cal-left', calLeftMonth);
  renderOneMonth('cal-right', calRightMonth);
}

function renderOneMonth(containerId, monthDate) {
  const container = document.getElementById(containerId);
  const year = monthDate.getFullYear();
  const month = monthDate.getMonth();
  const firstDay = new Date(year, month, 1).getDay() || 7;
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const daysInPrev = new Date(year, month, 0).getDate();
  const isLeft = containerId === 'cal-left';

  let html = `<div class="cal-nav">`;
  if (isLeft) {
    html += `<button onclick="navMonth(-1)">&lsaquo;</button>`;
  } else {
    html += `<span></span>`;
  }
  html += `<span>${year}年${month + 1}月</span>`;
  if (!isLeft) {
    html += `<button onclick="navMonth(1)">&rsaquo;</button>`;
  } else {
    html += `<span></span>`;
  }
  html += `</div><div class="cal-grid">`;
  const dows = ['一','二','三','四','五','六','日'];
  dows.forEach(d => { html += `<div class="cal-dow">${d}</div>`; });

  for (let i = firstDay - 1; i > 0; i--) {
    const d = daysInPrev - i + 1;
    const prevMonth = month - 1;
    const prevYear = prevMonth < 0 ? year - 1 : year;
    const pm = prevMonth < 0 ? 11 : prevMonth;
    html += `<div class="cal-day other-month" onclick="onCalDayClick(${prevYear},${pm},${d})">${d}</div>`;
  }
  for (let d = 1; d <= daysInMonth; d++) {
    const thisDate = new Date(year, month, d);
    let cls = 'cal-day';
    if (dateStart && thisDate.getTime() === dateStart.getTime()) cls += ' range-start';
    else if (dateEnd && thisDate.getTime() === dateEnd.getTime()) cls += ' range-end';
    else if (dateStart && dateEnd && thisDate > dateStart && thisDate < dateEnd) cls += ' in-range';
    if (thisDate.toDateString() === today.toDateString()) cls += ' today';
    html += `<div class="${cls}" onclick="onCalDayClick(${year},${month},${d})">${d}</div>`;
  }
  const totalCells = firstDay - 1 + daysInMonth;
  const remaining = (7 - totalCells % 7) % 7;
  for (let d = 1; d <= remaining; d++) {
    const nextMonth = month + 1;
    const ny = nextMonth > 11 ? year + 1 : year;
    const nm = nextMonth > 11 ? 0 : nextMonth;
    html += `<div class="cal-day other-month" onclick="onCalDayClick(${ny},${nm},${d})">${d}</div>`;
  }
  html += `</div>`;
  container.innerHTML = html;
}

function navMonth(dir) {
  calLeftMonth.setMonth(calLeftMonth.getMonth() + dir);
  calRightMonth = new Date(calLeftMonth);
  calRightMonth.setMonth(calRightMonth.getMonth() + 1);
  renderCalendars();
}

// Close date panel when clicking outside
document.addEventListener('click', e => {
  const container = document.querySelector('.date-filter-container');
  if (!container) return;
  if (!document.contains(e.target)) return;
  if (!container.contains(e.target)) {
    document.getElementById('date-panel').classList.remove('open');
    document.getElementById('date-trigger').classList.remove('active');
  }
});

// Pill click handlers
function setupPills() {
  document.getElementById('filter-category-pills').addEventListener('click', e => {
    const pill = e.target.closest('.filter-pill');
    if (!pill) return;
    document.querySelectorAll('#filter-category-pills .filter-pill').forEach(p => p.classList.remove('active'));
    pill.classList.add('active');
    activeCategory = pill.dataset.value;
    currentPage = 1;
    renderNews();
  });

  document.getElementById('filter-company-pills').addEventListener('click', e => {
    const pill = e.target.closest('.filter-pill');
    if (!pill) return;
    document.querySelectorAll('#filter-company-pills .filter-pill').forEach(p => p.classList.remove('active'));
    pill.classList.add('active');
    activeCompany = pill.dataset.value;
    currentPage = 1;
    renderNews();
  });
}

function renderNews() {
  const keyword = document.getElementById('filter-keyword').value.toLowerCase();

  lastFiltered = newsData.filter(n => {
    if (activeCategory && n.category !== activeCategory) return false;
    if (activeCompany) {
      const mainCompanies = ['Meta', 'Google', '腾讯', '阿里巴巴', 'Amazon', 'Microsoft'];
      if (activeCompany === '其它') {
        if (mainCompanies.includes(n.company)) return false;
      } else {
        if (n.company !== activeCompany) return false;
      }
    }
    if (dateStart || dateEnd) {
      const nd = new Date(n.date);
      if (dateStart && nd < dateStart) return false;
      if (dateEnd) {
        const endOfDay = new Date(dateEnd);
        endOfDay.setHours(23, 59, 59, 999);
        if (nd > endOfDay) return false;
      }
    }
    if (keyword && !n.summary.toLowerCase().includes(keyword) && !n.company.toLowerCase().includes(keyword)) return false;
    return true;
  });

  const totalPages = Math.ceil(lastFiltered.length / pageSize) || 1;
  if (currentPage > totalPages) currentPage = totalPages;

  const startIdx = (currentPage - 1) * pageSize;
  const endIdx = Math.min(startIdx + pageSize, lastFiltered.length);
  const pageItems = lastFiltered.slice(startIdx, endIdx);

  const container = document.getElementById('news-list');
  const info = document.getElementById('results-info');
  if (lastFiltered.length > 0) {
    info.textContent = `${startIdx + 1}-${endIdx}/${lastFiltered.length}` + (lastFiltered.length !== newsData.length ? `（已筛选，总计 ${newsData.length} 条）` : ' 条');
  } else {
    info.textContent = `共 0 条结果`;
  }

  if (lastFiltered.length === 0) {
    container.innerHTML = `
      <div class="empty-state">
        <div class="empty-state-icon">&#128269;</div>
        <p>没有匹配的新闻条目，请调整筛选条件。</p>
      </div>
    `;
    document.getElementById('pagination').innerHTML = '';
    return;
  }

  container.innerHTML = pageItems.map(news => `
    <div class="news-card">
      <div class="news-card-header">
        <span class="news-tag ${news.category}">${categoryMap[news.category]}</span>
        <span class="news-company">${news.company}</span>
        <span class="news-date">${news.date}</span>
      </div>
      <div class="news-summary">${news.summary}</div>
      ${news.sources && news.sources.length ? `<div class="news-sources">${news.sources.map(s => `<a href="${s.url}" target="_blank" rel="noopener noreferrer">${s.title}</a>`).join('<br>')}</div>` : ''}
    </div>
  `).join('');

  renderPagination(totalPages);
}

function renderPagination(totalPages) {
  const pg = document.getElementById('pagination');
  if (totalPages <= 1) { pg.innerHTML = ''; return; }

  let html = `<span class="page-info">${(currentPage-1)*pageSize+1}-${Math.min(currentPage*pageSize, lastFiltered.length)}/${lastFiltered.length}</span>`;
  html += `<button onclick="goPage(${currentPage-1})" ${currentPage===1?'disabled':''}>&lsaquo;</button>`;

  const pages = [];
  pages.push(1);
  if (currentPage > 3) pages.push('...');
  for (let p = Math.max(2, currentPage-1); p <= Math.min(totalPages-1, currentPage+1); p++) pages.push(p);
  if (currentPage < totalPages - 2) pages.push('...');
  if (totalPages > 1) pages.push(totalPages);

  pages.forEach(p => {
    if (p === '...') {
      html += `<span class="page-ellipsis">...</span>`;
    } else {
      html += `<button class="${p===currentPage?'active':''}" onclick="goPage(${p})">${p}</button>`;
    }
  });

  html += `<button onclick="goPage(${currentPage+1})" ${currentPage===totalPages?'disabled':''}>&rsaquo;</button>`;
  html += `<select class="page-size-select" onchange="changePageSize(this.value)">`;
  [10, 20, 50].forEach(s => {
    html += `<option value="${s}" ${s===pageSize?'selected':''}>${s} 条/页</option>`;
  });
  html += `</select>`;
  pg.innerHTML = html;
}

function goPage(p) {
  const totalPages = Math.ceil(lastFiltered.length / pageSize) || 1;
  if (p < 1 || p > totalPages) return;
  currentPage = p;
  renderNews();
  window.scrollTo({ top: document.querySelector('.results-info').offsetTop - 80, behavior: 'smooth' });
}

function changePageSize(val) {
  pageSize = parseInt(val);
  currentPage = 1;
  renderNews();
}

function resetFilters() {
  activeCategory = '';
  activeCompany = '';
  document.querySelectorAll('#filter-category-pills .filter-pill').forEach(p => p.classList.remove('active'));
  document.querySelector('#filter-category-pills .filter-pill[data-value=""]').classList.add('active');
  document.querySelectorAll('#filter-company-pills .filter-pill').forEach(p => p.classList.remove('active'));
  document.querySelector('#filter-company-pills .filter-pill[data-value=""]').classList.add('active');
  clearDateFilter();
  document.getElementById('filter-keyword').value = '';
  renderNews();
}

document.getElementById('filter-keyword').addEventListener('input', () => { currentPage = 1; renderNews(); });

setupPills();
renderNews();
</script>
</body>
</html>
