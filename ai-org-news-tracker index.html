<html lang="zh-CN">

<style>

    --bg-cream: #F8FCFB;
    --bg-card: #FFFFFF;
    --text-primary: #1A3431;
    --text-secondary: #265F57;
    --text-muted: #53AE9F;
    --accent-primary: #265F57;
    --accent-light: #399385;
    --accent-lighter: #53AE9F;
    --accent-pale: #7ECABA;

    --accent-bg: #D7F0EA;
    --accent-surface: #F3FAF8;
    --accent-dark: #224D48;
    --accent-darkest: #1A3431;
    --border-light: #AEE1D5;
    --border-medium: #7ECABA;
    --tag-org: #1A3431;
    --tag-efficiency: #265F57;
    --tag-policy: #2C756C;
    --tag-talent: #399385;
    --tag-other: #53AE9F;

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", "PingFang SC", "Noto Sans CJK SC", sans-serif;
    background: var(--bg-cream);
    color: var(--text-primary);
    line-height: 1.6;
  }

  /* Header */
  .header {
    background: var(--accent-darkest);
    border-bottom: none;
    padding: 20px 40px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 12px rgba(26, 52, 49, 0.15);
  }
  .header-inner {
    max-width: 1400px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .header h1 {
    font-size: 22px;
    font-weight: 700;
    color: #FFFFFF;
    letter-spacing: -0.5px;
  }
  .header-meta {
    font-size: 13px;
    color: var(--accent-pale);
  }

  /* Description Bar */
  .description-bar {
    max-width: 1400px;
    margin: 24px auto 0;
    padding: 0 40px;
  }
  .description-bar p {
    font-size: 14px;
    line-height: 1.7;
    color: var(--text-secondary);
  }

  /* Main Content */
  .main {
    max-width: 1400px;
    margin: 0 auto;
    padding: 24px 40px;
  }

  /* Filters */
  .filters {
    background: transparent;
    border: none;
    border-radius: 0;
    padding: 0;
    margin-bottom: 24px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  .filter-row {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
  }
  .filter-row-label {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-secondary);
    min-width: 60px;
    flex-shrink: 0;
  }
  .filter-pills {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .filter-pill {
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 13px;
    border: 1px solid var(--border-light);
    background: transparent;
    color: var(--text-secondary);
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .filter-pill:hover {
    border-color: var(--accent-primary);
    color: var(--accent-primary);
  }
  .filter-pill.active {
    background: var(--accent-primary);
    border-color: var(--accent-primary);
    color: #FFFFFF;
  }
  .filter-row-controls {
    display: flex;
    gap: 10px;
    align-items: center;
    flex-wrap: wrap;
  }
  .filter-row-controls select {
    padding: 6px 12px;
    border: 1px solid var(--border-light);
    border-radius: 20px;
    font-size: 13px;
    color: var(--text-secondary);
    background: transparent;
    outline: none;
    cursor: pointer;
    transition: border-color 0.2s;
  }
  .filter-row-controls select:focus {
    border-color: var(--accent-primary);
  }
  .filter-keyword {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
  }
  .filter-keyword input {
    padding: 6px 14px;
    border: 1px solid var(--border-light);
    border-radius: 20px;
    font-size: 13px;
    color: var(--text-primary);
    background: transparent;
    min-width: 200px;
    outline: none;
    transition: border-color 0.2s;
  }
  .filter-keyword input:focus {
    border-color: var(--accent-primary);
  }
  .filter-reset {
    padding: 6px 14px;
    background: transparent;
    border: 1px solid var(--border-light);
    border-radius: 20px;
    color: var(--accent-lighter);
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .filter-reset:hover {
    border-color: var(--accent-primary);
    color: var(--accent-primary);
  }

  /* Date Filter */
  .date-filter-container {
    position: relative;
  }
  .date-trigger {
    padding: 6px 14px;
    border: 1px solid var(--border-light);
    border-radius: 20px;
    font-size: 13px;
    color: var(--text-secondary);
    background: transparent;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
    transition: border-color 0.2s;
  }
  .date-trigger:hover, .date-trigger.active {
    border-color: var(--accent-primary);
    color: var(--accent-primary);
  }
  .date-panel {
    display: none;
    position: absolute;
    top: calc(100% + 8px);
    left: 0;
    background: var(--bg-card);
    border: 1px solid var(--border-light);
    border-radius: 12px;
    box-shadow: 0 8px 24px rgba(26, 52, 49, 0.12);
    z-index: 200;
    overflow: hidden;
    min-width: 520px;
  }
  .date-panel.open {
    display: flex;
    flex-direction: column;
  }
  .date-panel-tabs {
    display: flex;
    border-bottom: 1px solid var(--border-light);
  }
  .date-tab-btn {
    flex: 1;
    padding: 10px 16px;
    font-size: 13px;
    font-weight: 600;
    border: none;
    background: transparent;
    color: var(--text-muted);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.2s;
  }
  .date-tab-btn.active {
    color: var(--accent-primary);
    border-bottom-color: var(--accent-primary);
  }
  .date-tab-btn:hover { color: var(--accent-primary); }
  .date-panel-body { padding: 20px 24px; }
  .date-presets {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr 1fr;
    gap: 8px;
  }
  .date-preset {
    padding: 8px 14px;
    border: 1px solid var(--border-light);
    border-radius: 8px;
    font-size: 13px;
    background: transparent;
    color: var(--text-secondary);
    cursor: pointer;
    transition: all 0.2s;
    text-align: center;
    white-space: nowrap;
  }
  .date-preset:hover { border-color: var(--accent-primary); color: var(--accent-primary); }
  .date-preset.active { background: var(--accent-primary); border-color: var(--accent-primary); color: white; }
  /* Calendar */
  .cal-header-row {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 12px;
    padding: 0 4px;
  }
  .cal-header-row input[type="date"] {
    padding: 6px 10px;
    border: 1px solid var(--border-light);
    border-radius: 8px;
    font-size: 13px;
    color: var(--text-primary);
    background: transparent;
    outline: none;
    flex: 1;
  }
  .cal-header-row input[type="date"]:focus { border-color: var(--accent-primary); }
  .cal-header-row .cal-arrow { color: var(--text-muted); font-size: 14px; }
  .cal-wrap {
    display: flex;
    gap: 24px;
  }
  .cal-month {
    flex: 1;
  }
  .cal-nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 8px;
  }
  .cal-nav button {
    background: none; border: none; cursor: pointer; font-size: 16px; color: var(--text-secondary); padding: 2px 6px; border-radius: 4px;
  }
  .cal-nav button:hover { background: var(--accent-surface); }
  .cal-nav span { font-size: 13px; font-weight: 600; color: var(--text-primary); }
  .cal-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 4px;
    text-align: center;
    font-size: 13px;
  }
  .cal-grid .cal-dow {
    font-weight: 600;
    color: var(--text-muted);
    padding: 4px 0;
  }
  .cal-grid .cal-day {
    padding: 6px 0;
    border-radius: 6px;
    cursor: pointer;
    color: var(--text-primary);
    transition: all 0.15s;
  }
  .cal-grid .cal-day:hover { background: var(--accent-surface); }
  .cal-grid .cal-day.other-month { color: var(--accent-lighter); }
  .cal-grid .cal-day.in-range { background: var(--accent-bg); }
  .cal-grid .cal-day.range-start,
  .cal-grid .cal-day.range-end {
    background: var(--accent-primary);
    color: white;
    font-weight: 600;
  }
  .cal-grid .cal-day.today { box-shadow: inset 0 0 0 1px var(--accent-primary); }
  .date-panel-footer {
    display: flex;
    justify-content: flex-end;
    gap: 8px;
    padding: 12px 20px;
    border-top: 1px solid var(--border-light);
  }
  .date-clear {
    padding: 6px 14px;
    border: 1px solid var(--border-light);
    border-radius: 8px;
    font-size: 13px;
    background: transparent;
    color: var(--text-muted);
    cursor: pointer;
  }
  .date-clear:hover { border-color: var(--accent-primary); color: var(--accent-primary); }
  .date-confirm {
    padding: 6px 14px;
    border: none;
    border-radius: 8px;
    font-size: 13px;
    background: var(--accent-primary);
    color: white;
    cursor: pointer;
  }
  .date-confirm:hover { background: var(--accent-light); }

  /* Results Info */
  .results-info {
    font-size: 13px;
    color: var(--accent-lighter);
    margin-bottom: 16px;
    padding-left: 4px;
  }

  /* News Cards */
  .news-list {
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  .news-card {
    background: var(--bg-card);
    border: 1px solid var(--border-light);
    border-radius: 12px;
    padding: 22px 26px;
    transition: box-shadow 0.2s, border-color 0.2s;
  }
  .news-card:hover {
    box-shadow: 0 4px 16px rgba(38, 95, 87, 0.08);
    border-color: var(--accent-pale);
  }
  .news-card-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 12px;
  }
  .news-tag {
    font-size: 11px;
    font-weight: 600;
    padding: 4px 12px;
    border-radius: 20px;
    color: white;
    white-space: nowrap;
  }
  .news-tag.org { background: var(--tag-org); }
  .news-tag.efficiency { background: var(--tag-efficiency); }
  .news-tag.policy { background: var(--tag-policy); }
  .news-tag.talent { background: var(--tag-talent); }
  .news-tag.other { background: var(--tag-other); }

  .news-company {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-secondary);
  }
  .news-date {
    font-size: 12px;
    color: var(--accent-lighter);
    margin-left: auto;
  }
  .news-summary {
    font-size: 14px;
    line-height: 1.8;
    color: var(--text-primary);
  }
  .news-sources {
    margin-top: 14px;
    padding-top: 14px;
    border-top: 1px solid var(--border-light);
  }
  .news-sources a {
    font-size: 13px;
    color: var(--accent-primary);
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    gap: 4px;
    margin-right: 16px;
    margin-bottom: 6px;
    padding: 3px 0;
    transition: color 0.2s;
  }
  .news-sources a:hover {
    color: var(--accent-light);
    text-decoration: underline;
  }
  .news-sources a::before {
    content: "\2197";
    font-size: 12px;
    opacity: 0.7;
  }

  /* Empty State */
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--accent-lighter);
  }
  .empty-state-icon {
    font-size: 48px;
    margin-bottom: 12px;
    opacity: 0.6;
  }

  /* Footer */
  .footer {
    max-width: 1400px;
    margin: 40px auto 0;
    padding: 20px 40px 40px;
    text-align: center;
    font-size: 12px;
    color: var(--accent-lighter);
    border-top: 1px solid var(--border-light);
  }

  /* Responsive */
  @media (max-width: 768px) {
    .header { padding: 16px 20px; }
    .main { padding: 16px 20px; }
    .description-bar { padding: 0 20px; }
    .filters { gap: 12px; }
    .filter-row { gap: 8px; }
    .filter-pill { padding: 5px 10px; font-size: 12px; }
    .filter-keyword input { min-width: 150px; }
    .news-card { padding: 16px; }
  }
</style>
</head>

              <div class="cal-header-row">
                <input type="date" id="date-start" onchange="onDateInputChange()">
                <span class="cal-arrow">&rarr;</span>
                <input type="date" id="date-end" onchange="onDateInputChange()">
              </div>
              <div class="cal-wrap">
                <div class="cal-month" id="cal-left"></div>
                <div class="cal-month" id="cal-right"></div>
              </div>
            </div>
          </div>
          <div class="date-panel-footer">
            <button class="date-clear" onclick="clearDateFilter()">清除</button>
            <button class="date-confirm" onclick="toggleDatePanel()">确定</button>
          </div>
        </div>
      </div>
    </div>
    <div class="filter-row">
      <span class="filter-row-label">搜索</span>
      <div class="filter-keyword">

        <button class="filter-reset" onclick="resetFilters()">重置全部</button>
      </div>
    </div>
  </div>

  <div class="results-info" id="results-info"></div>

  <div class="news-list" id="news-list"></div>
</div>

<div class="footer">

</div>

const categoryMap = {
  'org': '组织相关',
  'efficiency': 'AI提效/人力影响',
  'policy': 'AI风险与政策',
  'talent': 'AI人才',
  'other': '其它AI相关'
};

// State
let activeCategory = '';
let activeCompany = '';
let dateStart = null;
let dateEnd = null;

// Populate company pills — no longer needed, hardcoded in HTML

// Date filter logic
let calLeftMonth = new Date(2026, 5, 1); // June 2026
let calRightMonth = new Date(2026, 6, 1); // July 2026
let rangeSelecting = null; // null | 'start' | 'end'

function toggleDatePanel() {
  const panel = document.getElementById('date-panel');
  const trigger = document.getElementById('date-trigger');
  panel.classList.toggle('open');
  trigger.classList.toggle('active');
  if (panel.classList.contains('open')) renderCalendars();
}

function switchDateTab(tab) {
  document.querySelectorAll('.date-tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelector(`.date-tab-btn[data-tab="${tab}"]`).classList.add('active');
  document.getElementById('date-tab-dynamic').style.display = tab === 'dynamic' ? 'block' : 'none';
  document.getElementById('date-tab-fixed').style.display = tab === 'fixed' ? 'block' : 'none';
  if (tab === 'fixed') renderCalendars();
}

function setDynamicRange(range) {
  const today = new Date(2026, 5, 23);
  let start, end = new Date(today);
  document.querySelectorAll('.date-preset').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  if (typeof range === 'number') {
    start = new Date(today); start.setDate(today.getDate() - range + 1);
  } else if (range === 'thisWeek') {
    start = new Date(today); const day = start.getDay() || 7; start.setDate(start.getDate() - day + 1);
  } else if (range === 'lastWeek') {
    end = new Date(today); const day = end.getDay() || 7; end.setDate(end.getDate() - day);
    start = new Date(end); start.setDate(end.getDate() - 6);
  } else if (range === 'thisMonth') {
    start = new Date(today.getFullYear(), today.getMonth(), 1);
  } else if (range === 'lastMonth') {
    start = new Date(today.getFullYear(), today.getMonth() - 1, 1);
    end = new Date(today.getFullYear(), today.getMonth(), 0);
  }
  dateStart = start; dateEnd = end;
  syncDateInputs(); updateDateDisplay(); renderNews();
}

function onDateInputChange() {
  const s = document.getElementById('date-start').value;
  const e = document.getElementById('date-end').value;
  if (s) dateStart = new Date(s);
  if (e) dateEnd = new Date(e);
  if (dateStart && dateEnd && dateEnd < dateStart) {
    const tmp = dateStart; dateStart = dateEnd; dateEnd = tmp; syncDateInputs();
  }
  updateDateDisplay(); renderCalendars(); renderNews();
}

function onCalDayClick(year, month, day) {
  const clicked = new Date(year, month, day);
  if (!dateStart || (dateStart && dateEnd)) {
    dateStart = clicked; dateEnd = null;
  } else {
    if (clicked < dateStart) { dateEnd = dateStart; dateStart = clicked; }
    else { dateEnd = clicked; }
  }
  syncDateInputs(); updateDateDisplay(); renderCalendars(); renderNews();
}

function syncDateInputs() {
  const fmt = d => d ? d.toISOString().slice(0, 10) : '';
  document.getElementById('date-start').value = fmt(dateStart);
  document.getElementById('date-end').value = fmt(dateEnd);
}

function clearDateFilter() {
  dateStart = null; dateEnd = null;
  document.getElementById('date-start').value = '';
  document.getElementById('date-end').value = '';
  document.querySelectorAll('.date-preset').forEach(b => b.classList.remove('active'));
  updateDateDisplay(); renderCalendars(); renderNews();
}

function updateDateDisplay() {
  const display = document.getElementById('date-display');
  if (!dateStart && !dateEnd) { display.textContent = '全部时间'; }
  else {
    const fmt = d => d ? `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}` : '...';
    display.textContent = `${fmt(dateStart)} ~ ${fmt(dateEnd)}`;
  }
}

function renderCalendars() {
  renderOneMonth('cal-left', calLeftMonth);
  renderOneMonth('cal-right', calRightMonth);
}

function renderOneMonth(containerId, monthDate) {
  const container = document.getElementById(containerId);
  const year = monthDate.getFullYear();
  const month = monthDate.getMonth();
  const today = new Date(2026, 5, 23);
  const firstDay = new Date(year, month, 1).getDay() || 7; // Mon=1
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const daysInPrev = new Date(year, month, 0).getDate();
  const isLeft = containerId === 'cal-left';

  let html = `<div class="cal-nav">`;
  if (isLeft) {
    html += `<button onclick="navMonth(-1)">&lsaquo;</button>`;
  } else {
    html += `<span></span>`;
  }
  html += `<span>${year}年${month + 1}月</span>`;
  if (!isLeft) {
    html += `<button onclick="navMonth(1)">&rsaquo;</button>`;
  } else {
    html += `<span></span>`;
  }
  html += `</div><div class="cal-grid">`;
  const dows = ['一','二','三','四','五','六','日'];
  dows.forEach(d => { html += `<div class="cal-dow">${d}</div>`; });

  // Previous month fill
  for (let i = firstDay - 1; i > 0; i--) {
    const d = daysInPrev - i + 1;
    const prevMonth = month - 1;
    const prevYear = prevMonth < 0 ? year - 1 : year;
    const pm = prevMonth < 0 ? 11 : prevMonth;
    html += `<div class="cal-day other-month" onclick="onCalDayClick(${prevYear},${pm},${d})">${d}</div>`;
  }
  // Current month
  for (let d = 1; d <= daysInMonth; d++) {
    const thisDate = new Date(year, month, d);
    let cls = 'cal-day';
    if (dateStart && thisDate.getTime() === dateStart.getTime()) cls += ' range-start';
    else if (dateEnd && thisDate.getTime() === dateEnd.getTime()) cls += ' range-end';
    else if (dateStart && dateEnd && thisDate > dateStart && thisDate < dateEnd) cls += ' in-range';
    if (thisDate.getTime() === today.getTime()) cls += ' today';
    html += `<div class="${cls}" onclick="onCalDayClick(${year},${month},${d})">${d}</div>`;
  }
  // Next month fill
  const totalCells = firstDay - 1 + daysInMonth;
  const remaining = (7 - totalCells % 7) % 7;
  for (let d = 1; d <= remaining; d++) {
    const nextMonth = month + 1;
    const ny = nextMonth > 11 ? year + 1 : year;
    const nm = nextMonth > 11 ? 0 : nextMonth;
    html += `<div class="cal-day other-month" onclick="onCalDayClick(${ny},${nm},${d})">${d}</div>`;
  }
  html += `</div>`;
  container.innerHTML = html;
}

function navMonth(dir) {
  calLeftMonth.setMonth(calLeftMonth.getMonth() + dir);
  calRightMonth = new Date(calLeftMonth);
  calRightMonth.setMonth(calRightMonth.getMonth() + 1);
  renderCalendars();
}

// Close date panel only when clicking outside (not on calendar interaction)
document.addEventListener('click', e => {
  const container = document.querySelector('.date-filter-container');
  if (!container) return;
  // If the click target was removed from DOM (e.g. calendar re-render), don't close
  if (!document.contains(e.target)) return;
  if (!container.contains(e.target)) {
    document.getElementById('date-panel').classList.remove('open');
    document.getElementById('date-trigger').classList.remove('active');
  }
});

// Pill click handlers
function setupPills() {
  document.getElementById('filter-category-pills').addEventListener('click', e => {
    const pill = e.target.closest('.filter-pill');
    if (!pill) return;
    document.querySelectorAll('#filter-category-pills .filter-pill').forEach(p => p.classList.remove('active'));
    pill.classList.add('active');
    activeCategory = pill.dataset.value;
    renderNews();
  });

  document.getElementById('filter-company-pills').addEventListener('click', e => {
    const pill = e.target.closest('.filter-pill');
    if (!pill) return;
    document.querySelectorAll('#filter-company-pills .filter-pill').forEach(p => p.classList.remove('active'));
    pill.classList.add('active');
    activeCompany = pill.dataset.value;
    renderNews();
  });
}

// Render news
function renderNews() {
  const keyword = document.getElementById('filter-keyword').value.toLowerCase();

  let filtered = newsData.filter(n => {
    if (activeCategory && n.category !== activeCategory) return false;
    if (activeCompany) {
      const mainCompanies = ['Meta', 'Google', '腾讯', '阿里巴巴', 'Amazon', 'Microsoft'];
      if (activeCompany === '其它') {
        if (mainCompanies.includes(n.company)) return false;
      } else {
        if (n.company !== activeCompany) return false;
      }
    }
    if (dateStart || dateEnd) {
      const nd = new Date(n.date);
      if (dateStart && nd < dateStart) return false;
      if (dateEnd && nd > dateEnd) return false;
    }
    if (keyword && !n.summary.toLowerCase().includes(keyword) && !n.company.toLowerCase().includes(keyword)) return false;
    return true;
  });

  const container = document.getElementById('news-list');
  const info = document.getElementById('results-info');
  info.textContent = `共 ${filtered.length} 条结果` + (filtered.length !== newsData.length ? `（已筛选，总计 ${newsData.length} 条）` : '');

  if (filtered.length === 0) {
    container.innerHTML = `
      <div class="empty-state">
        <div class="empty-state-icon">&#128269;</div>
        <p>没有匹配的新闻条目，请调整筛选条件。</p>
      </div>
    `;
    return;
  }

  container.innerHTML = filtered.map(news => `
    <div class="news-card">
      <div class="news-card-header">
        <span class="news-tag ${news.category}">${categoryMap[news.category]}</span>
        <span class="news-company">${news.company}</span>
        <span class="news-date">${news.date}</span>
      </div>
      <div class="news-summary">${news.summary}</div>
      <div class="news-sources">
        ${news.sources.map(s => `<a href="${s.url}" target="_blank" rel="noopener">${s.title}</a>`).join('<br>')}
      </div>
    </div>
  `).join('');
}

function resetFilters() {
  activeCategory = '';
  activeCompany = '';
  document.querySelectorAll('#filter-category-pills .filter-pill').forEach(p => p.classList.remove('active'));
  document.querySelector('#filter-category-pills .filter-pill[data-value=""]').classList.add('active');
  document.querySelectorAll('#filter-company-pills .filter-pill').forEach(p => p.classList.remove('active'));
  document.querySelector('#filter-company-pills .filter-pill[data-value=""]').classList.add('active');
  clearDateFilter();
  document.getElementById('filter-keyword').value = '';
  renderNews();
}

// Event listeners
document.getElementById('filter-keyword').addEventListener('input', renderNews);

// Init
setupPills();
renderNews();
</script>
